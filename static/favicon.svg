<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#10131a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4d8eff"/>
      <stop offset="100%" stop-color="#adc6ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4d8eff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4d8eff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="31" height="31" x="0.5" y="0.5" rx="6.5" fill="none" stroke="#4d8eff" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Glow area under chart line -->
  <path d="M5,22 L10,18 L15,20 L19,12 L23,14 L27,7 L27,26 L5,26 Z" fill="url(#glow)"/>
  <!-- Chart line -->
  <path d="M5,22 L10,18 L15,20 L19,12 L23,14 L27,7" fill="none" stroke="url(#line)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pulse dot at peak -->
  <circle cx="27" cy="7" r="2.5" fill="#4d8eff" opacity="0.3"/>
  <circle cx="27" cy="7" r="1.5" fill="#adc6ff"/>
</svg>
